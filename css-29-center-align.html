<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Center Align</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        h1{
            text-align: center;
        }

        .texto{
            text-align: center;
            margin-bottom: 30px;
        }

        .caja{
            width: 300px;
            height: 150px;
            margin: auto;
            background-color: royalblue;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
        }

    </style>

</head>
<body>

    <h1>Center Align en CSS</h1>

    <p class="texto">
        Este texto está centrado utilizando <strong>text-align: center;</strong>
    </p>

    <div class="caja">
        Contenido Centrado
    </div>

</body>
</html>
