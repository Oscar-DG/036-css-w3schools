<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Fonts</title>

    <style>

        body{
            background-color: #f2f2f2;
        }

        h1{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        .serif{
            font-family: "Times New Roman", Times, serif;
        }

        .sans{
            font-family: Arial, Helvetica, sans-serif;
        }

        .mono{
            font-family: "Courier New", Courier, monospace;
        }

    </style>

</head>
<body>

    <h1>Fuentes en CSS</h1>

    <p class="serif">
        Este texto utiliza una fuente Serif.
    </p>

    <p class="sans">
        Este texto utiliza una fuente Sans-serif.
    </p>

    <p class="mono">
        Este texto utiliza una fuente Monospace.
    </p>

</body>
</html>
