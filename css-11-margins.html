<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Margins</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        h1{
            text-align: center;
        }

        .caja1{
            border: 2px solid blue;
            margin: 20px;
            padding: 10px;
        }

        .caja2{
            border: 2px solid green;
            margin-top: 40px;
            margin-right: 60px;
            margin-bottom: 30px;
            margin-left: 80px;
            padding: 10px;
        }

        .caja3{
            width: 300px;
            margin: auto;
            border: 2px solid red;
            padding: 10px;
        }

    </style>

</head>
<body>

    <h1>Márgenes en CSS</h1>

    <div class="caja1">
        Esta caja utiliza un margen igual en los cuatro lados.
    </div>

    <div class="caja2">
        Esta caja tiene un margen diferente en cada lado.
    </div>

    <div class="caja3">
        Esta caja está centrada utilizando <strong>margin: auto</strong>.
    </div>

</body>
</html>
