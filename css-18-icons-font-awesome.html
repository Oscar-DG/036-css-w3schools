<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Icons - Font Awesome</title>

    <!-- Librería Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        h1{
            color: #333;
        }

        i{
            font-size: 50px;
            margin: 15px;
        }

        .nube{
            color: skyblue;
        }

        .corazon{
            color: red;
        }

        .carro{
            color: green;
        }

        .archivo{
            color: orange;
        }

        .menu{
            color: purple;
        }

    </style>

</head>
<body>

    <h1>Íconos con Font Awesome</h1>

    <i class="fa-solid fa-cloud nube"></i>

    <i class="fa-solid fa-heart corazon"></i>

    <i class="fa-solid fa-car carro"></i>

    <i class="fa-solid fa-file archivo"></i>

    <i class="fa-solid fa-bars menu"></i>

</body>
</html>
