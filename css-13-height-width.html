<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Height and Width</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        h1{
            text-align: center;
        }

        .caja1{
            width: 50%;
            height: 200px;
            background-color: powderblue;
            border: 2px solid blue;
            margin: 20px;
            padding: 10px;
        }

        .caja2{
            width: 300px;
            height: 100px;
            background-color: lightgreen;
            border: 2px solid green;
            margin: 20px;
            padding: 10px;
        }

    </style>

</head>
<body>

    <h1>Height y Width en CSS</h1>

    <div class="caja1">
        Esta caja tiene un ancho del 50% y una altura de 200px.
    </div>

    <div class="caja2">
        Esta caja tiene un ancho de 300px y una altura de 100px.
    </div>

</body>
</html>
