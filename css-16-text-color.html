<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Text Color</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: lightgray;
            color: blue;
        }

        h1{
            color: green;
            text-align: center;
        }

        h2{
            color: red;
        }

        p{
            color: #333333;
        }

        .caja{
            background-color: navy;
            color: white;
            padding: 15px;
            margin-top: 20px;
        }

    </style>

</head>
<body>

    <h1>Color del Texto en CSS</h1>

    <h2>Ejemplo de subtítulo</h2>

    <p>
        Este párrafo utiliza un color personalizado para mejorar la lectura.
    </p>

    <div class="caja">
        Este texto es blanco sobre un fondo azul para tener un buen contraste.
    </div>

</body>
</html>
