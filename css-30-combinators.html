<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Combinators</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        h1{
            text-align: center;
        }

        /* Descendiente */
        div p{
            color: blue;
        }

        /* Hijo directo */
        section > p{
            background-color: lightyellow;
        }

        /* Hermano siguiente */
        h2 + p{
            color: red;
        }

        /* Hermanos posteriores */
        h3 ~ p{
            font-style: italic;
        }

    </style>

</head>
<body>

    <h1>Combinadores en CSS</h1>

    <div>
        <p>Este párrafo es descendiente de un div.</p>
    </div>

    <section>
        <p>Este es hijo directo de section.</p>
        <div>
            <p>Este párrafo no es hijo directo de section.</p>
        </div>
    </section>

    <h2>Título</h2>
    <p>Este párrafo es el hermano siguiente de h2.</p>

    <h3>Otro título</h3>
    <p>Primer hermano posterior.</p>
    <p>Segundo hermano posterior.</p>

</body>
</html>
