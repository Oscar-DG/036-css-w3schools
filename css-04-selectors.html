<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>

    <style>

        /* Selector por elemento */
        h1{
            color: blue;
            text-align: center;
        }

        /* Selector por id */
        #titulo{
            color: red;
        }

        /* Selector por clase */
        .parrafo{
            color: green;
            font-size: 20px;
        }

    </style>

</head>
<body>

    <h1>Selector por elemento</h1>

    <h2 id="titulo">Selector por ID</h2>

    <p class="parrafo">
        Este párrafo utiliza un selector de clase.
    </p>

    <p>
        Este párrafo no tiene clase y no cambia de color.
    </p>

</body>
</html>
