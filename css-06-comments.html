<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Comments</title>

    <style>

        /* Cambia el color de fondo de la página */
        body{
            background-color: lightgray;
        }

        /* Estilo para el título */
        h1{
            color: blue;
            text-align: center;
        }

        /* Estilo para los párrafos */
        p{
            color: red;
            font-size: 20px;
        }

        /*
        Este es un comentario
        de varias líneas.
        Se utiliza para explicar
        una sección del código.
        */

    </style>

</head>
<body>

    <h1>Comentarios en CSS</h1>

    <!-- Comentario de HTML -->

    <p>Este párrafo utiliza estilos definidos en CSS.</p>

    <p>Los comentarios ayudan a organizar el código.</p>

</body>
</html>
