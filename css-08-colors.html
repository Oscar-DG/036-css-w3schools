<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Colors</title>

    <style>

        body{
            background-color: lightgray;
            font-family: Arial, sans-serif;
        }

        h1{
            color: Tomato;
            text-align: center;
        }

        p{
            color: DodgerBlue;
            font-size: 20px;
        }

        .caja{
            background-color: MediumSeaGreen;
            color: white;
            border: 3px solid Violet;
            padding: 15px;
            margin-top: 20px;
        }

        .rgb{
            background-color: rgb(255, 99, 71);
            color: white;
            padding: 10px;
        }

        .hex{
            background-color: #ff6347;
            color: white;
            padding: 10px;
        }

    </style>

</head>
<body>

    <h1>Colores en CSS</h1>

    <p>Este párrafo utiliza el color DodgerBlue.</p>

    <div class="caja">
        Este cuadro tiene fondo verde y un borde violeta.
    </div>

    <p class="rgb">
        Este color está definido con RGB.
    </p>

    <p class="hex">
        Este color está definido con HEX.
    </p>

</body>
</html>
