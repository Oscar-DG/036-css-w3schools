<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Borders</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        h1{
            text-align: center;
        }

        .dotted{
            border: 3px dotted red;
            padding: 10px;
        }

        .dashed{
            border: 3px dashed blue;
            padding: 10px;
        }

        .solid{
            border: 3px solid green;
            padding: 10px;
        }

        .double{
            border: 5px double purple;
            padding: 10px;
        }

    </style>

</head>
<body>

    <h1>Bordes en CSS</h1>

    <p class="dotted">Este párrafo tiene un borde punteado.</p>

    <p class="dashed">Este párrafo tiene un borde discontinuo.</p>

    <p class="solid">Este párrafo tiene un borde sólido.</p>

    <p class="double">Este párrafo tiene un borde doble.</p>

</body>
</html>
