<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Padding</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        h1{
            text-align: center;
        }

        .caja1{
            border: 3px solid blue;
            padding: 20px;
            margin: 20px;
        }

        .caja2{
            border: 3px solid green;
            padding-top: 30px;
            padding-right: 40px;
            padding-bottom: 20px;
            padding-left: 50px;
            margin: 20px;
        }

        .caja3{
            border: 3px solid red;
            padding: 15px 30px;
            margin: 20px;
        }

    </style>

</head>
<body>

    <h1>Padding en CSS</h1>

    <div class="caja1">
        Esta caja tiene el mismo padding en los cuatro lados.
    </div>

    <div class="caja2">
        Esta caja tiene un padding diferente en cada lado.
    </div>

    <div class="caja3">
        Esta caja utiliza la propiedad abreviada de padding.
    </div>

</body>
</html>
