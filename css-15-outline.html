<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Outline</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        h1{
            text-align: center;
        }

        .caja1{
            border: 3px solid black;
            outline: 5px solid green;
            padding: 15px;
            margin: 20px;
        }

        .caja2{
            border: 3px solid blue;
            outline-style: dashed;
            outline-color: red;
            outline-width: 4px;
            outline-offset: 8px;
            padding: 15px;
            margin: 30px;
        }

    </style>

</head>
<body>

    <h1>Outline en CSS</h1>

    <div class="caja1">
        Esta caja tiene un borde negro y un outline verde.
    </div>

    <div class="caja2">
        Esta caja utiliza las propiedades individuales del outline.
    </div>

</body>
</html>
