<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Dropdown Menu</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            margin-top: 50px;
        }

        .dropdown{
            position: relative;
            display: inline-block;
        }

        .boton{
            background-color: royalblue;
            color: white;
            padding: 15px 25px;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }

        .contenido{
            display: none;
            position: absolute;
            background-color: white;
            min-width: 180px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .contenido a{
            display: block;
            color: black;
            text-decoration: none;
            padding: 12px;
        }

        .contenido a:hover{
            background-color: #dddddd;
        }

        .dropdown:hover .contenido{
            display: block;
        }

        .dropdown:hover .boton{
            background-color: #1f4fb8;
        }

    </style>

</head>
<body>

    <h1>Dropdown Menu</h1>

    <div class="dropdown">

        <button class="boton">
            Menú
        </button>

        <div class="contenido">
            <a href="#">Inicio</a>
            <a href="#">Servicios</a>
            <a href="#">Contacto</a>
        </div>

    </div>

</body>
</html>
