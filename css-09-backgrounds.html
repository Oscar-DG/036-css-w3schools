<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Backgrounds</title>

    <style>

        body{
            background-color: lightblue;
            font-family: Arial, sans-serif;
        }

        h1{
            background-color: green;
            color: white;
            text-align: center;
            padding: 15px;
        }

        p{
            background-color: yellow;
            padding: 10px;
        }

        .transparente{
            background: rgba(0, 128, 0, 0.3);
            padding: 15px;
            margin-top: 20px;
        }

    </style>

</head>
<body>

    <h1>Fondos en CSS</h1>

    <p>
        Este párrafo tiene un fondo amarillo utilizando la propiedad
        <strong>background-color</strong>.
    </p>

    <div class="transparente">
        Este cuadro utiliza un fondo con transparencia mediante RGBA.
    </div>

</body>
</html>
