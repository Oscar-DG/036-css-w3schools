<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        h1{
            text-align: center;
        }

        .caja{
            width: 300px;
            border: 10px solid green;
            padding: 30px;
            margin: 20px;
            background-color: lightblue;
        }

    </style>

</head>
<body>

    <h1>Modelo de Caja (Box Model)</h1>

    <div class="caja">
        Esta caja muestra el contenido, el padding, el borde y el margen que forman el Box Model de CSS.
    </div>

</body>
</html>
